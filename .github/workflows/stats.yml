name: Jobs board stats

on:
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python stats.py
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
