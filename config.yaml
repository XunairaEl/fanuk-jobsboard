# FAN-UK jobs board scraper configuration.
# Everything here is safe to commit — secrets live in environment variables / GitHub Secrets.

notion:
  jobs_database_id: "b8aa364d442b4b03b590f2d89d4c1d9b"
  companies_database_id: "323b54fb84b8442385042783367c13d2"

filters:
  # A role is kept if its location matches the UK rules AND its title or
  # department matches at least one tech keyword.
  uk_location_substrings:
    - united kingdom
    - england
    - scotland
    - wales
    - northern ireland
    - london
    - edinburgh
    - glasgow
    - manchester
    - birmingham
    - leeds
    - bristol
    - cardiff
    - belfast
    - cambridge
    - oxford
    - reading
    - newcastle
    - nottingham
    - sheffield
    - brighton
    - liverpool
    - milton keynes
    - leicester
    - ipswich
    - southampton
    - portsmouth
    - bath
    - exeter
    - swansea
    - aberdeen
    - dundee
    - coventry
    - osterley
    - livingston
  # "UK" / "U.K." are matched separately with word boundaries so that
  # e.g. "Ukraine" does not slip through.

  tech_keywords:
    - engineer
    - engineering
    - software
    - developer
    - data
    - product
    - designer
    - product design
    - ux
    - security
    - cyber
    - devops
    - sre
    - reliability
    - cloud
    - platform
    - infrastructure
    - machine learning
    - ml
    - ai
    - analytics
    - business analyst
    - scientist
    - research
    - qa
    - quality
    - test
    - architect
    - backend
    - frontend
    - full stack
    - full-stack
    - mobile
    - ios
    - android
    - network
    - database
    - technical
    - technology
    - tech
    - it
    - solutions
    - solution

  # Roles whose TITLE matches any of these are excluded even if a tech keyword
  # also matched (e.g. a sales role in a "Platform" department).
  exclude_title_keywords:
    - sales
    - account executive
    - account manager
    - business development
    - marketing
    - recruiter
    - recruiting
    - talent
    - people partner
    - legal
    - counsel
    - payroll
    - workplace
    - office manager
    - finance specialist
    - finance broker
    - broker
    - customer success
    # market-research agency ladders (Ipsos-style), not R&D research
    - research executive
    - research manager
    - research director
    - qualitative research
    - healthcare research
    - project executive

# Discipline classification: first bucket whose keywords match the role's
# title or department wins; roles matching nothing get "Other".
disciplines:
  Security: [security, cyber, infosec]
  Data & AI: [data, machine learning, ml, ai, analytics, analyst, intelligence]
  Research: [research, scientist, phd]
  Product & Design: [product, design, designer, ux]
  Engineering: [engineer, engineering, developer, software, devops, sre, reliability,
                infrastructure, platform, cloud, backend, frontend, full stack,
                full-stack, mobile, ios, android, qa, test, architect, technical,
                network, database, solutions, support, it]

sponsor_register:
  publication_url: "https://www.gov.uk/government/publications/register-of-licensed-sponsors-workers"

